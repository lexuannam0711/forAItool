<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: #0f1419;
      color: #e7e9ea;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 1rem;
    }
    .wrap {
      width: 100%;
      max-width: 960px;
    }
    video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: #000;
    }
    p.hint {
      margin: 0.75rem 0 0;
      font-size: 0.875rem;
      color: #8b98a5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Phát video</h1>
    <video controls playsinline preload="metadata">
      <source
        src="chuahuongg.mp4"
        type="video/mp4"
      />
      Trình duyệt không hỗ trợ thẻ video.
    </video>
    <p class="hint">
      Đổi nguồn: đặt file <code>video.mp4</code> cạnh trang này và sửa
      <code>src</code> thành <code>video.mp4</code>.
    </p>
  </div>
</body>
</html>
